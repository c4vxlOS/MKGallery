<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Gallery</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel="stylesheet" href="assets/gallery.css">
    <link rel="stylesheet" href="assets/items.css">
    <link rel="stylesheet" href="assets/style.css">
    <link rel="stylesheet" href="assets/notifications.css">
</head>
<body>
    <div class="notifications"></div>

C3.54419 5.9373 4.30402 6.69715 5.24132 6.69715C6.17865 6.69715 6.93846 5.9373 6.93846 5.00001C6.93846 4.06269 6.17865 3.30286 5.24132 3.30286C4.30402 3.30286 3.54419 4.06269 3.54419 5.00001Z" stroke-width="0.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span>Settings</span>
        </div>

        <div class="segment row tooltip" tooltip-pos="right" onclick="document.querySelector('#export__modal').classList.toggle('active')">
            <svg width="10" height="10" viewBox="0 0 10 10" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M5.40002 4.60005L8.68002 1.32007" stroke-width="0.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M8.99995 2.92V1H7.07996" stroke-width="0.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M4.59999 1H3.8C1.8 1 1 1.8 1 3.8V6.2C1 8.2 1.8 9 3.8 9H6.19999C8.19999 9 8.99999 8.2 8.99999 6.2V5.4" stroke-width="0.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span>Export media</span>
        </div>
    </div>

    <div class="filter__panel" id="filter__panel">
        <div class="row">
            <label>Filter type:</label>
            <div class="option__switcher">
                <span style="font-size: small;" onclick="filterType=0; reload();" class="active">MATCH ALL</span>
                <span style="font-size: small;" onclick="filterType=1; reload();">MATCH ONE</span>
            </div>
        </div>

        <br>

        <div class="row">
            <p>Filters:</p>
            <div class="filters__list">
                <span class="active">All</span>
            </div>
        </div>
    </div>

    <div class="gallery__items">
        <!--Script will generate here-->
    </div>

    <div class="modal" id="export__modal">
        <div class="modal__content">
            <button class="primary" onclick="(async () => { packageB64(); exportPage(); })()">Export as offline mode</button>
            <button class="primary" onclick="downloadMedia()">Export media</button>
            <button class="primary" onclick="download(items.map(x => `[${x.categories.join(';')}] ${x.url}`).join('\n'), 'sources.txt')">Export sources</button>
            <button class="primary" onclick="download(items.map(x => `[${x.categories.join(';')}] ${x.origin}`).join('\n'), 'origins.txt')">Export origins</button>
            <button class="primary" onclick="let itemB = [...items]; items = []; exportPage('New Gallery'); items = itemB;">Export new empty gallery</button>
        </div>
    </div>

    <div class="modal" id="item__options__modal">
        <div class="modal__content">
            <p style="position: absolute; top: 10px;">Some filename</p>

            <div class="row filter__panel" style="padding: 2px 15px;">
                <p>Filters:</p>
                <div class="filters__list">
                    <span onclick="document.querySelector('#create__category__modal').classList.add('active')">+</span>    
                </div>
            </div>

            <div class="rounded__container" style="max-width: 90ch;">
                <button class="primary" onclick="window.open(current.url, '_blank').focus()">View source</button>
                <button class="primary" onclick="window.open(current.origin, '_blank').focus()">View origin</button>
                <button class="primary" onclick="downloadURL(current.url, current.filename)">Download</button>
                <button class="primary" onclick="items = items.filter(x => x != current); this.parentNode.parentNode.parentNode.click(); reload(); warnUnsavedChanges()">Delete</button>
            </div>
        </div>
    </div>

    <div class="modal" id="create__category__modal" no-click>
        <div class="modal__content">
            <h1>Create Filter</h1>
            <input type="text" class="input" placeholder="Filter name">
            <br><br>
            <div class="row">
                <button class="primary" onclick="this.parentNode.querySelector('.secondary').click(); createCategory(this.parentNode.parentNode.querySelector('input').value)">Create</button>
                <button class="secondary" onclick="this.parentNode.parentNode.parentNode.classList.remove('active')">Close</button>
            </div>
        </div>
    </div>

    <div class="modal" id="add__media__modal" no-click>
        <div class="modal__content">
            <h1>Add media</h1>
            <textarea name="" id="" class="primary" style="width: 90%; height: 50vh; max-height: 60ch;" placeholder="Place your urls: [Category1;Category2;...] https://url1/ ..."></textarea>
            <br><br>
            <div class="row">
                <button class="primary" onclick="this.parentNode.querySelector('.secondary').click(); addURLs(this.parentNode.parentNode.querySelector('textarea').value)">Add</button>
                <button class="secondary" onclick="this.parentNode.parentNode.parentNode.classList.remove('active')">Close</button>
            </div>
        </div>
    </div>

    <div class="modal" id="settings__modal">
        <div class="modal__content flow-right">
            <div class="row">
                <label>Grid view:</label>
                <div class="option__switcher">
                    <span onclick="document.body.classList.remove('grid__view')" class="active">Off</span>
                    <span onclick="document.body.classList.add('grid__view')">On</span>
                </div>
            </div>
        
            <div class="row">
                <label>List view:</label>
                <div class="option__switcher">
                    <span onclick="document.body.classList.remove('list__view')" class="active">Off</span>
                    <span onclick="document.body.classList.add('list__view')">On</span>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/script.js"></script>
</body>
</html>
